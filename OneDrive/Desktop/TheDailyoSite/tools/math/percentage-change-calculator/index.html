<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Percentage Change Calculator | TheDailyo</title>
  <link rel="stylesheet" href="../../../../style.css">
  <style>
    .calc-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
      margin: 30px 0;
    }
    @media (min-width: 768px) {
      .calc-container {
        grid-template-columns: 1fr 1fr;
      }
    }
    .calc-box {
      background: var(--card-bg, #1e293b);
      border: 1px solid var(--border-color, #334155);
      border-radius: 12px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-row-inputs {
      display: flex;
      gap: 15px;
    }
    .form-row-inputs input {
      width: 100%;
      padding: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 500;
      box-sizing: border-box;
    }
    .form-row-inputs input:focus {
      outline: none;
      border-color: var(--accent-blue, #3b82f6);
    }
    .result-banner {
      background: #0f172a;
      border-radius: 8px;
      padding: 20px;
      margin-top: 15px;
      text-align: center;
    }
    .result-value {
      font-size: 1.8rem;
      font-weight: 800;
      color: #fff;
    }
    .result-desc {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <header style="text-align: left; margin-bottom: 40px;">
      <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color, #334155); padding-bottom: 20px; margin-bottom: 40px;">
        <div class="status-line" style="margin: 0; font-weight: 700; letter-spacing: 0.05em;">THE DAILY OPTIMIZATION</div>
      </div>
      <a href="../index.html" style="color: var(--accent-blue, #3b82f6); text-decoration: none; font-weight: 500; font-size: 0.9rem; display: inline-block; margin-bottom: 20px;">← Back to Math Tools</a>
      <h1 style="font-size: 2.8rem; line-height: 1.1; margin-bottom: 15px; letter-spacing: -0.04em; font-weight: 800;">Percentage Tools</h1>
      <p style="color: #e2e8f0; margin: 0; font-size: 1.1rem; line-height: 1.6;">Run raw statistical growth tracking or basic part-to-whole data isolating in real time.</p>
    </header>

    <main>
      <div class="calc-container">
        
        <!-- Engine 1: Percentage Change -->
        <div class="calc-box">
          <div>
            <h3 style="margin-top: 0; margin-bottom: 20px; font-size: 1.3rem; font-weight: 700; color: #fff;">1. Growth / Decay Matrix</h3>
            <div class="form-group">
              <div class="form-row-inputs">
                <div>
                  <label>Initial Value</label>
                  <input type="number" id="v1" value="50" oninput="calcChange()">
                </div>
                <div>
                  <label>Final Value</label>
                  <input type="number" id="v2" value="75" oninput="calcChange()">
                </div>
              </div>
            </div>
          </div>
          
          <div class="result-banner">
            <div class="result-value" id="changeOut">0.00%</div>
            <div class="result-desc" id="changeDesc">Shift Value</div>
          </div>
        </div>

        <!-- Engine 2: Pure Fraction Finder -->
        <div class="calc-box">
          <div>
            <h3 style="margin-top: 0; margin-bottom: 20px; font-size: 1.3rem; font-weight: 700; color: #fff;">2. Proportional Split</h3>
            <div class="form-group">
              <div class="form-row-inputs">
                <div>
                  <label>What is</label>
                  <input type="number" id="p1" value="15" oninput="calcPercentOf()">
                </div>
                <div style="display: flex; align-items: flex-end; padding-bottom: 10px; font-weight: 700; color: #475569;">% of</div>
                <div>
                  <label>This Total</label>
                  <input type="number" id="p2" value="200" oninput="calcPercentOf()">
                </div>
              </div>
            </div>
          </div>
          
          <div class="result-banner">
            <div class="result-value" id="pctOut">0.00</div>
            <div class="result-desc">Calculated Yield</div>
          </div>
        </div>

      </div>
    </main>

    <footer style="margin-top: 80px; padding-top: 30px; border-top: 1px solid var(--border-color, #334155); text-align: center;">
      <p style="font-size: 0.85rem; color: #94a3b8;">© 2026 TheDailyo. Fluid Computation Modules.</p>
    </footer>

  </div>

  <script>
    function calcChange() {
      const v1 = parseFloat(document.getElementById('v1').value);
      const v2 = parseFloat(document.getElementById('v2').value);
      const out = document.getElementById('changeOut');
      const desc = document.getElementById('changeDesc');

      if (isNaN(v1) || isNaN(v2) || v1 === 0) {
        out.innerText = "0.00%";
        out.style.color = "#fff";
        desc.innerText = "Invalid Base";
        return;
      }

      const diff = ((v2 - v1) / Math.abs(v1)) * 100;
      out.innerText = (diff >= 0 ? "+" : "") + diff.toFixed(2) + "%";
      
      if (diff > 0) {
        out.style.color = "#10b981"; // Green increase
        desc.innerText = "Net Growth Increase";
      } else if (diff < 0) {
        out.style.color = "#ef4444"; // Red decrease
        desc.innerText = "Net Margin Decay";
      } else {
        out.style.color = "#fff";
        desc.innerText = "No Net Variance";
      }
    }

    function calcPercentOf() {
      const p1 = parseFloat(document.getElementById('p1').value);
      const p2 = parseFloat(document.getElementById('p2').value);
      const out = document.getElementById('pctOut');

      if (isNaN(p1) || isNaN(p2)) {
        out.innerText = "0.00";
        return;
      }

      const res = (p1 / 100) * p2;
      out.innerText = res.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    // Fire default calculation sequences on load
    calcChange();
    calcPercentOf();
  </script>

</body>
</html>
